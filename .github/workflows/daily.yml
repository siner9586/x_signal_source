name: Daily X Signal Source

on:
  # Immediate self-heal: when this workflow or the daily pipeline is patched,
  # run once immediately. The remote idempotency guard prevents duplicate issues.
  push:
    branches:
      - main
    paths:
      - '.github/workflows/daily.yml'
      - 'scripts/pipeline.mjs'
      - 'scripts/generate-source-data.mjs'
      - 'scripts/qa.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.nvmrc'
      - 'data/sources/**'
  schedule:
    # Hard requirement: Beijing/Taipei latest issue should be generated before 08:00.
    # Dense early window: every 5 minutes from 05:02 to 07:57 BJT/Taipei.
    # UTC mapping: 21:02..23:57 UTC previous day.
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 21-23 * * *'
    # Post-08:00 compensation window: every 10 minutes from 08:07 to 13:57 BJT/Taipei.
    # This should normally skip because the early window has already created the issue.
    - cron: '7,17,27,37,47,57 0-5 * * *'
    # Final compensation: 14:07 and 14:17 BJT/Taipei.
    - cron: '7,17 6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force regenerate today even if data/issues/YYYY-MM-DD.json already exists'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

concurrency:
  group: daily-x-signal-source
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Remote idempotency guard
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
          TZ: Asia/Shanghai
          FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.force == 'true' }}
        run: |
          TODAY="$(date +%F)"
          ISSUE_FILE="data/issues/${TODAY}.json"
          echo "today=${TODAY}" >> "$GITHUB_OUTPUT"
          echo "issue_file=${ISSUE_FILE}" >> "$GITHUB_OUTPUT"

          if [ "$FORCE" = "true" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "force=true" >> "$GITHUB_OUTPUT"
            echo "Force mode enabled. Regenerating ${ISSUE_FILE}."
            exit 0
          fi

          if gh api "repos/${GITHUB_REPOSITORY}/contents/${ISSUE_FILE}?ref=${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Daily update already exists remotely: ${ISSUE_FILE}."
            echo "Compensation chain stops here: no checkout, no install, no fetch, no build, no commit."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No remote issue found for ${TODAY}; generation will run."
          fi

      - name: Stop because today's issue already exists
        if: steps.guard.outputs.exists == 'true'
        run: |
          echo "Today's issue already exists: ${{ steps.guard.outputs.issue_file }}"
          echo "This compensation slot exits immediately and does not continue the daily pipeline."

      - name: Checkout
        if: steps.guard.outputs.exists != 'true'
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        if: steps.guard.outputs.exists != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'

      - name: Install dependencies
        if: steps.guard.outputs.exists != 'true'
        run: npm ci

      - name: Generate daily issue
        if: steps.guard.outputs.exists != 'true'
        env:
          TZ: Asia/Shanghai
        run: npm run daily

      - name: Run QA
        if: steps.guard.outputs.exists != 'true'
        env:
          TZ: Asia/Shanghai
        run: npm run qa

      - name: Build site
        if: steps.guard.outputs.exists != 'true'
        run: npm run build

      - name: Commit and push if changed
        if: steps.guard.outputs.exists != 'true'
        env:
          TZ: Asia/Shanghai
        run: |
          git pull --rebase || true
          if git diff --quiet; then
            echo "No changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data content public package-lock.json || true
            git commit -m "chore: update x signal source for $(date +%F)"
            git push
          fi
