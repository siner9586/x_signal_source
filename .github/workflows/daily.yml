name: Daily X Signal Source

on:
  schedule:
    # 06:12 Beijing/Taipei time = 22:12 UTC on the previous day.
    - cron: '12 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-x-signal-source
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Generate daily issue
        env:
          TZ: Asia/Shanghai
        run: npm run daily

      - name: Run QA
        env:
          TZ: Asia/Shanghai
        run: npm run qa

      - name: Build site
        run: npm run build

      - name: Commit and push if changed
        env:
          TZ: Asia/Shanghai
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data content public package-lock.json || true
            git commit -m "chore: update x signal source for $(date +%F)"
            git push
          fi
