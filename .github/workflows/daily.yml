name: Daily X Signal Source

on:
  schedule:
    # Multi-slot redundant schedule: 50 attempts, every 10 minutes.
    # Beijing/Taipei time: 06:07, 06:17, ..., 14:17.
    # GitHub cron is UTC:
    # 22:07..22:57 UTC previous day = 06:07..06:57 BJT next day
    # 23:07..23:57 UTC previous day = 07:07..07:57 BJT next day
    # 00:07..05:57 UTC same day     = 08:07..13:57 BJT same day
    # 06:07..06:17 UTC same day     = 14:07..14:17 BJT same day
    - cron: '7,17,27,37,47,57 22-23 * * *'
    - cron: '7,17,27,37,47,57 0-5 * * *'
    - cron: '7,17 6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force regenerate today even if data/issues/YYYY-MM-DD.json already exists'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

concurrency:
  group: daily-x-signal-source
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Remote idempotency guard
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
          TZ: Asia/Shanghai
          FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.force == 'true' }}
        run: |
          TODAY="$(date +%F)"
          ISSUE_FILE="data/issues/${TODAY}.json"
          echo "today=${TODAY}" >> "$GITHUB_OUTPUT"
          echo "issue_file=${ISSUE_FILE}" >> "$GITHUB_OUTPUT"

          if [ "$FORCE" = "true" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "force=true" >> "$GITHUB_OUTPUT"
            echo "Force mode enabled. Regenerating ${ISSUE_FILE}."
            exit 0
          fi

          if gh api "repos/${GITHUB_REPOSITORY}/contents/${ISSUE_FILE}?ref=${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Daily update already exists remotely: ${ISSUE_FILE}."
            echo "Compensation chain stops here: no checkout, no install, no fetch, no build, no commit."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No remote issue found for ${TODAY}; generation will run."
          fi

      - name: Stop because today's issue already exists
        if: steps.guard.outputs.exists == 'true'
        run: |
          echo "Today's issue already exists: ${{ steps.guard.outputs.issue_file }}"
          echo "This compensation slot exits immediately and does not continue the daily pipeline."

      - name: Checkout
        if: steps.guard.outputs.exists != 'true'
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        if: steps.guard.outputs.exists != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        if: steps.guard.outputs.exists != 'true'
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Generate daily issue
        if: steps.guard.outputs.exists != 'true'
        env:
          TZ: Asia/Shanghai
        run: npm run daily

      - name: Run QA
        if: steps.guard.outputs.exists != 'true'
        env:
          TZ: Asia/Shanghai
        run: npm run qa

      - name: Build site
        if: steps.guard.outputs.exists != 'true'
        run: npm run build

      - name: Commit and push if changed
        if: steps.guard.outputs.exists != 'true'
        env:
          TZ: Asia/Shanghai
        run: |
          git pull --rebase || true
          if git diff --quiet; then
            echo "No changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data content public package-lock.json || true
            git commit -m "chore: update x signal source for $(date +%F)"
            git push
          fi
