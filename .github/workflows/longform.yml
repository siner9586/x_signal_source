name: Longform Podcast Signals

on:
  workflow_dispatch:
    inputs:
      run_transcription:
        description: "Run automatic transcription on GitHub runner"
        required: false
        default: "true"
      max_items:
        description: "Max queued episodes to transcribe in this run"
        required: false
        default: "1"
      transcribe_strategy:
        description: "subtitle_then_audio tries captions first; audio_only skips captions and runs Whisper"
        required: false
        default: "subtitle_then_audio"
        type: choice
        options:
          - subtitle_then_audio
          - audio_only
      whisper_model:
        description: "Whisper model used for audio transcription"
        required: false
        default: "base"
        type: choice
        options:
          - tiny
          - base
          - small
          - medium
  schedule:
    # Lightweight discovery + subtitle-first transcription. Taipei/Beijing 07:42.
    - cron: "42 23 * * *"

permissions:
  contents: write

concurrency:
  group: longform-podcast-signals
  cancel-in-progress: false

jobs:
  longform:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-longform-v1-${{ hashFiles('scripts/transcribe.py', 'scripts/longform-auto-transcribe.mjs') }}
          restore-keys: |
            ${{ runner.os }}-pip-longform-v1-

      - name: Cache Whisper models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/whisper
          key: ${{ runner.os }}-whisper-${{ github.event_name == 'workflow_dispatch' && inputs.whisper_model || 'base' }}-v1
          restore-keys: |
            ${{ runner.os }}-whisper-base-v1
            ${{ runner.os }}-whisper-

      - name: Install system media tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Node dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install free transcription tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade yt-dlp faster-whisper

      - name: Discover longform episodes
        env:
          TZ: Asia/Taipei
          LONGFORM_MAX_FETCH_SOURCES: 36
          LONGFORM_FETCH_TIMEOUT_MS: 7000
        run: npm run longform:discover

      - name: Build longform queue
        run: npm run longform:queue

      - name: Auto transcribe queued episodes
        if: github.event_name == 'schedule' || inputs.run_transcription == 'true'
        env:
          TZ: Asia/Taipei
          LONGFORM_AUTO_TRANSCRIBE_ITEMS: ${{ github.event_name == 'workflow_dispatch' && inputs.max_items || '1' }}
          LONGFORM_TRANSCRIBE_STRATEGY: ${{ github.event_name == 'workflow_dispatch' && inputs.transcribe_strategy || 'subtitle_then_audio' }}
          LONGFORM_SUBTITLE_LANGS: "en.*,en,zh.*,zh-Hans,zh-Hant,zh"
          LONGFORM_WHISPER_MODEL: ${{ github.event_name == 'workflow_dispatch' && inputs.whisper_model || 'base' }}
          LONGFORM_WHISPER_LANGUAGE: "auto"
          LONGFORM_WHISPER_DEVICE: "cpu"
          LONGFORM_WHISPER_COMPUTE_TYPE: "int8"
        run: npm run longform:auto-transcribe

      - name: Rebuild longform queue after transcription
        run: npm run longform:queue

      - name: Build longform pages and indexes
        run: npm run longform:build

      - name: Longform QA
        run: npm run longform:qa

      - name: Build site
        run: npm run build

      - name: Commit and push if changed
        run: |
          git pull --rebase || true
          if git diff --quiet; then
            echo "No longform changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data content public package-lock.json || true
            git commit -m "chore: update longform podcast transcripts"
            git push
          fi
